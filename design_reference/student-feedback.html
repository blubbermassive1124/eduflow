<meta charset="utf-8" />

<title>EduFlow — Screens v1</title>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
:root {
  /* Light mode */
  --bg: #FCFBF8;
  --surface: #F7F5F1;
  --raised: #FFFFFF;
  --border: #E8E5E0;
  --border-strong: #D6D2CB;
  --ink: #1A1918;
  --muted: #6B6862;
  --faint: #A39D95;

  --accent: #0E4F5E;
  --accent-hover: #093E4B;
  --accent-soft: rgba(14, 79, 94, 0.08);

  --success: #10B981;
  --success-soft: rgba(16, 185, 129, 0.1);
  --danger: #DC2626;
  --danger-soft: rgba(220, 38, 38, 0.08);
  --warning: #D97706;
  --warning-soft: rgba(217, 119, 6, 0.1);

  --font-ui: 'Inter', 'Noto Sans TC', -apple-system, sans-serif;
  --font-body: 'Source Serif 4', 'Noto Serif TC', Georgia, serif;
  --font-display: 'Inter', 'Noto Sans TC', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;

  --t-fast: 120ms cubic-bezier(0.2, 0, 0.2, 1);
  --t-med: 240ms cubic-bezier(0.2, 0, 0.2, 1);
  --t-slow: 480ms cubic-bezier(0.2, 0, 0.2, 1);

  --r-sm: 4px;
  --r-md: 6px;
  --r-lg: 10px;

  --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #f0eee9; }
body {
  font-family: var(--font-ui);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* KaTeX size tuning — match Source Serif body size */
.katex { font-size: 1em; }

/* Micro utility classes used across screens */
.ef-micro {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  font-family: var(--font-ui);
}

/* Thin ring for focused inputs */
.ef-input:focus { outline: none; border-bottom-color: var(--accent); }

/* Buttons — scoped to .ef- to avoid global leak */
.ef-btn {
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.01em;
  height: 36px;
  padding: 0 16px;
  border-radius: var(--r-sm);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all var(--t-fast);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.ef-btn-primary { background: var(--accent); color: #fff; }
.ef-btn-primary:hover { background: var(--accent-hover); }
.ef-btn-secondary { background: transparent; color: var(--ink); border-color: var(--border-strong); }
.ef-btn-secondary:hover { border-color: var(--ink); }
.ef-btn-ghost { background: transparent; color: var(--muted); }
.ef-btn-ghost:hover { background: var(--surface); color: var(--ink); }

/* Tweaks panel */
.tweaks-panel {
  position: fixed; right: 20px; bottom: 20px;
  background: #fff; border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 16px; width: 260px;
  box-shadow: var(--shadow-md);
  font-family: var(--font-ui);
  z-index: 1000;
  font-size: 13px;
}
.tweaks-panel .tw-title {
  font-size: 11px; font-weight: 500; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
}
.tweaks-panel label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; color: var(--ink); }
.tweaks-panel select, .tweaks-panel input[type="text"] {
  font-family: var(--font-ui); font-size: 12px;
  border: 1px solid var(--border-strong); border-radius: 4px;
  padding: 4px 8px; background: #fff; color: var(--ink);
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="screens/shared.jsx"></script>
<script type="text/babel" src="screens/student-feedback.jsx"></script>
<script type="text/babel" src="screens/mount.jsx"></script>
<script type="text/babel">
  // Wait for component to be defined (cross-file scope)
  (function tryMount(){
    if (window.StudentFeedback && window.mountScreen) {
      mountScreen(window.StudentFeedback, 1280, 900);
    } else setTimeout(tryMount, 30);
  })();
</script>
</body>
</html>
